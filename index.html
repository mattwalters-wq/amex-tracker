<style>

.lock-b{width:100%;max-width:240px;padding:14px;border-radius:28px;border:none;background:var(--sage-deep);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;font-family:inherit}

.hdr-s{font-size:10px;color:var(--text3);margin-top:2px}

.pb{display:flex;flex-direction:column;align-items:center;background:var(--terra-bg);border:1px solid var(--terra-border);border-radius:12px;padding:6px 14px}

.sv{flex:1;padding:11px;border-radius:24px;border:none;background:var(--sage-deep);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}

.sy{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:6px;vertical-align:middle}
.sy-on{background:var(--sage)}
.sy-off{background:var(--over)}
.sy-ld{background:var(--ochre);animation:pu 1s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.scan-drop{border:2px dashed var(--card-border);border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--card)}
.scan-drop:hover,.scan-drop.over{border-color:var(--sage);background:var(--sage-bg)}
.scan-spinner{display:inline-block;width:20px;height:20px;border:2.5px solid var(--bg2);border-top-color:var(--sage-deep);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}

.scan-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--card);border-radius:12px;border:1px solid var(--card-border);margin-bottom:4px;cursor:pointer}

</style>
</head>

<script>
const SUPABASE_URL="https://cvuznuccqquqqramcqzn.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2dXpudWNjcXF1cXFyYW1jcXpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzU5MDUsImV4cCI6MjA4ODYxMTkwNX0._wwzBR4lGUdRLa7AcxHsf3BBy6KQU3CZTbzN4CT3sOM";

const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DC=[{id:"groceries",l:"Groceries",i:"🛒"},{id:"fuel",l:"Fuel",i:"⛽"},{id:"health",l:"Health",i:"💊"},{id:"kids",l:"Kids",i:"👧"},{id:"pets",l:"Pets",i:"🐾"},{id:"transport",l:"Transport",i:"🚗"},{id:"shopping",l:"Shopping",i:"🛍"},{id:"other_daily",l:"Other",i:"📦"}];
const SC=[{id:"eating_out",l:"Eating Out",i:"🍽"},{id:"coffee",l:"Coffee",i:"☕"},{id:"wine",l:"Wine & Drinks",i:"🍷"},{id:"kb",l:"K&B",i:"🧁"},{id:"market",l:"Market",i:"🥬"},{id:"other_splurge",l:"Other",i:"🎉"}];
const BCC=[{id:"electricity",l:"Electricity",i:"⚡"},{id:"gas",l:"Gas",i:"🔥"},{id:"water",l:"Water",i:"💧"},{id:"insurance_car",l:"Car Ins",i:"🚙"},{id:"insurance_home",l:"Home Ins",i:"🏠"},{id:"racv_club",l:"RACV Club",i:"🏛"},{id:"council",l:"Council",i:"📋"},{id:"rego",l:"Rego",i:"🚘"},{id:"internet",l:"Internet",i:"📡"},{id:"phone",l:"Phone",i:"📱"},{id:"garden",l:"Garden",i:"🌿"},{id:"piano",l:"Piano",i:"🎹"},{id:"pilates",l:"Pilates",i:"🧘"},{id:"horse",l:"Horse Riding",i:"🐴"},{id:"swimming",l:"Swimming",i:"🏊"},{id:"other_bill",l:"Other",i:"📄"}];
const AC=[...DC,...SC,...BCC];
const fc=id=>AC.find(c=>c.id===id)||{l:id,i:"📦"};
const catsFor=b=>b==="daily"?DC:b==="splurge"?SC:BCC;

// Unique ID generator
let idCounter=0;
function uid(){return Date.now().toString(36)+"-"+(idCounter++).toString(36)+"-"+Math.random().toString(36).slice(2,7)}

let tx=[],st={pin:"2026",daily_weekly:605,splurge_weekly:250,bills_monthly:1166,pay_day:4};
let apiKey="";
let vw="dash",fB="daily",fC="groceries",fW="matt",fCard="amex";
let sb=null,uL=true;
let editId=null,editB="daily",editC="groceries",editW="matt",editCard="amex";
let pendingIds=new Set(),busy=false;
let scanResults=[],scanBusy=false;

function pwStart(d,pd){const x=new Date(d);x.setHours(0,0,0,0);let diff=x.getDay()-pd;if(diff<0)diff+=7;x.setDate(x.getDate()-diff);return x}
function pwEnd(d,pd){const s=pwStart(d,pd),e=new Date(s);e.setDate(s.getDate()+6);e.setHours(23,59,59,999);return e}
function inCW(td,pd){const n=new Date(),s=pwStart(n,pd),e=pwEnd(n,pd),d=new Date(td);return d>=s&&d<=e}
function inLW(td,pd){const s=pwStart(new Date(),pd),ls=new Date(s);ls.setDate(s.getDate()-7);const le=new Date(ls);le.setDate(ls.getDate()+6);le.setHours(23,59,59,999);const d=new Date(td);return d>=ls&&d<=le}
function pwRange(pd){const s=pwStart(new Date(),pd),e=pwEnd(new Date(),pd),f=d=>`${d.getDate()} ${d.toLocaleString("default",{month:"short"})}`;return`${f(s)} - ${f(e)}`}
function dleft(pd){const e=pwEnd(new Date(),pd),n=new Date();n.setHours(0,0,0,0);return Math.max(1,Math.ceil((e-n)/864e5))}
const mk=d=>{const x=new Date(d);return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}`};
const bcol=p=>p>=100?"var(--over)":p>=80?"var(--ochre)":"var(--sage-deep)";

function loadL(){try{const d=JSON.parse(localStorage.getItem("amex-v11"));if(d){tx=d.tx||[];st=d.st||st;apiKey=d.apiKey||""}}catch(e){}}
function saveL(){try{localStorage.setItem("amex-v11",JSON.stringify({tx,st,apiKey}))}catch(e){}}

async function fetchAll(){
  if(!sb||busy||scanBusy)return;
  try{
    const{data}=await sb.from("transactions").select("*").order("created_at",{ascending:false});
    if(data){
      const serverIds=new Set(data.map(t=>t.id));
      const pendingTx=tx.filter(t=>pendingIds.has(t.id)&&!serverIds.has(t.id));
      tx=[...pendingTx,...data];
      for(const id of pendingIds){if(serverIds.has(id))pendingIds.delete(id)}
      saveL();render();
    }
  }catch(e){}
}

async function initSB(){
  if(!SUPABASE_URL||SUPABASE_URL==="YOUR_SUPABASE_URL"){uL=true;loadL();sdot("off");return}
  try{
    sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function handleScanFile(e){if(e.target.files[0])processScanFile(e.target.files[0])}

let scanCardType="amex";

async function processScanFile(file){
  scanBusy=true;
  const out=document.getElementById("scan-output");
  // Ask which card first
  out.innerHTML=`<div class="cd"><div class="lb">WHICH CARD?</div><div class="tgr" style="margin-top:10px"><button class="tg on-amx" onclick="scanCardType='amex';doScan()">💳 Amex</button><button class="tg" onclick="scanCardType='debit';doScan()">🏦 Debit</button></div></div>`;
  window._scanFile=file;
}

async function doScan(){
  const file=window._scanFile;
  const out=document.getElementById("scan-output");
  out.innerHTML=`<div class="cd" style="text-align:center;padding:30px"><div class="scan-spinner"></div><div style="font-size:13px;color:var(--text2);margin-top:8px">Reading your statement...</div></div>`;

  const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file)});
  const mediaType=file.type||"image/jpeg";
  const merchantHistory=tx.slice(0,50).map(t=>`"${t.note}" -> bucket:${t.bucket}, category:${t.category}`).join("\n");
  const catList=AC.map(c=>`${c.id} (${c.l})`).join(", ");

  const prompt=`You are analysing a screenshot of a credit card or bank statement app. Extract every transaction visible in the image.

For each transaction return a JSON array of objects with these fields:
- "merchant": the merchant name as shown
- "amount": the dollar amount as a number (no $ sign)
- "date": the date in YYYY-MM-DD format (use 2026 as the year if not shown)
- "bucket": one of "daily", "splurge", or "bill"
- "category": one of these IDs: ${catList}
- "who": default to "matt"

CATEGORISATION RULES:
- Supermarkets (Coles, Aldi, Woolworths), pharmacies, fuel stations, hardware stores -> bucket "daily"
- Restaurants, cafes, coffee shops, bars, wine shops, markets, bakeries -> bucket "splurge"
- Utilities, insurance, phone, internet, council, memberships -> bucket "bill"
- Fuel/petrol stations are always "daily" category "fuel"
- Coffee shops are "splurge" category "coffee"

Here is how the user has previously categorised similar merchants:
${merchantHistory}

IMPORTANT: Return ONLY a JSON array, no markdown, no backticks, no explanation. Skip pending transactions and non-purchase entries like "Plan It".`;

  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mediaType,data:b64}},{type:"text",text:prompt}]}]})
    });
    const data=await resp.json();
    if(data.error){scanBusy=false;out.innerHTML=`<div class="cd"><p style="color:var(--over);font-size:12px">Error: ${data.error.message}</p>`;return}
    const text=data.content[0].text.trim();
    scanResults=JSON.parse(text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim());
    // Mark card type and check dupes
    scanResults.forEach(r=>{
      r.card=scanCardType;
      const isDupe=tx.some(t=>Math.abs(t.amount-r.amount)<0.01&&t.note&&r.merchant&&t.note.toLowerCase().includes(r.merchant.toLowerCase().slice(0,10)));
      if(isDupe)r._dupe=true;
    });
    scanBusy=false;
    renderScanResults();
  }catch(e){
    console.error("Scan error:",e);
    scanBusy=false;scanResults=[];
    out.innerHTML=`<div class="cd"><p style="color:var(--over);font-size:12px">Failed to process. Check your API key.</p><p style="font-size:11px;color:var(--text3);margin-top:6px">${e.message||""}</p></div>`;
  }
}

function renderScanResults(){
  const out=document.getElementById("scan-output");
  if(!scanResults.length){out.innerHTML=`<div class="cd"><p style="color:var(--text2);font-size:13px">No transactions found. Try a clearer screenshot.</p></div>`;return}
  let h=`<div class="cd"><div class="lb">FOUND ${scanResults.length} TRANSACTIONS (${scanCardType==="amex"?"💳 Amex":"🏦 Debit"})</div><p style="font-size:11px;color:var(--text3);margin-bottom:12px">Tap a row to cycle its bucket. Then confirm.</p></div>`;
  scanResults.forEach((r,i)=>{
    const cat=fc(r.category);
    const tg=r.bucket==="daily"?"d":r.bucket==="splurge"?"s":"b";
    const tl=r.bucket==="daily"?"DAILY":r.bucket==="splurge"?"SPLURGE":"BILL";
    h+=`<div class="scan-row" style="${r._dupe?"opacity:.5;":""}" onclick="editScanRow(${i})"><div style="display:flex;align-items:center;gap:10px;flex:1"><span style="font-size:17px">${cat.i}</span><div style="flex:1"><div style="font-size:12px;font-weight:600">${r.merchant}<span class="tag tag-${tg}">${tl}</span>${r._dupe?`<span style="font-size:9px;color:var(--ochre);margin-left:4px">DUPE?</span>`:""}</div><div style="font-size:10px;color:var(--text3);margin-top:1px">${cat.l} · ${r.date||"today"}</div></div></div><div style="display:flex;align-items:center"><div style="font-size:14px;font-weight:700">$${Number(r.amount).toFixed(2)}</div><span style="color:var(--text3);font-size:16px;margin-left:6px">›</span></div></div>`;
  });
  h+=`<div class="scan-actions"><button class="sv" onclick="confirmScan()">✓ Add ${scanResults.filter(r=>!r._skip).length} Transactions</button><button class="cnb" onclick="scanResults=[];scanBusy=false;renderScan()">Cancel</button></div>`;
  out.innerHTML=h;
}

function editScanRow(i){
  const r=scanResults[i];
  const buckets=["daily","splurge","bill"];
  r.bucket=buckets[(buckets.indexOf(r.bucket)+1)%3];
  const cats=catsFor(r.bucket);
  if(!cats.find(c=>c.id===r.category))r.category=cats[0].id;
  renderScanResults();
}

async function confirmScan(){
  const toAdd=scanResults.filter(r=>!r._skip);
  const out=document.getElementById("scan-output");
  out.innerHTML=`<div class="cd" style="text-align:center;padding:30px"><div class="scan-spinner"></div><div style="font-size:13px;color:var(--text2);margin-top:8px">Adding ${toAdd.length} transactions...</div></div>`;

  const newTxns=toAdd.map(r=>{
    // Robust date parsing - try multiple formats, fall back to now
    let dt=new Date();
    if(r.date){
      // Try YYYY-MM-DD format first
      const d=new Date(r.date+"T12:00:00");
      if(!isNaN(d.getTime()))dt=d;
      else{
        // Try DD/MM/YYYY or other formats
        const parts=r.date.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
        if(parts){const d2=new Date(parts[3].length===2?"20"+parts[3]:parts[3],parts[2]-1,parts[1]);if(!isNaN(d2.getTime()))dt=d2}
      }
    }
    return {
      id:uid(),
      amount:Number(r.amount),
      category:r.category,
      bucket:r.bucket,
      note:r.merchant,
      who:r.who||"matt",
      card:r.card||scanCardType,
      created_at:dt.toISOString()
    };
  });

  // Add locally
  newTxns.forEach(t=>{pendingIds.add(t.id);tx.unshift(t)});
  saveL();

  // Batch insert to Supabase
  busy=true;
  if(!uL&&sb){
    // Try batch insert first
    const{error}=await sb.from("transactions").insert(newTxns);
    if(error){
      console.error("Batch insert error:",error.message);
      // If it failed (likely missing card column), try without card field
      const noCardTxns=newTxns.map(({card,...rest})=>rest);
      const{error:e2}=await sb.from("transactions").insert(noCardTxns);
      if(e2){
        console.error("Batch insert without card also failed:",e2.message);
        // Last resort: insert one by one
        for(const t of noCardTxns){
          const{error:e3}=await sb.from("transactions").insert(t);
          if(!e3)pendingIds.delete(t.id);
          else console.error("Single insert failed:",t.id,e3.message);
        }
      } else {
        newTxns.forEach(t=>pendingIds.delete(t.id));
      }
    } else {
      newTxns.forEach(t=>pendingIds.delete(t.id));
    }
  }
  busy=false;
  saveL();

  const count=toAdd.length;
  scanResults=[];
  scanBusy=false;
  console.log("Scan complete. Added",count,"txns. Total tx now:",tx.length,"Local pending:",pendingIds.size);

  out.innerHTML=`<div class="cd" style="text-align:center;padding:30px"><div style="font-size:32px;margin-bottom:8px">✅</div><div style="font-size:14px;color:var(--sage-deep);font-weight:600">${count} transactions added!</div><button class="sb" style="margin-top:14px" onclick="scanResults=[];scanBusy=false;go('dash')">View Dashboard</button></div>`;
  render();
}

  let hi=`<div class="hh"><div class="lb">THIS MONTH · tap to edit</div>${tx.length?`<button class="rb" onclick="resetAll()">Clear All</button>`:""}</div>`;
  if(!mt.length){hi+=`<div class="empty">No transactions yet.<small>Tap Add or Scan to get started.</small></div>`}
  else{mt.forEach(t=>{const c=fc(t.category),d=new Date(t.created_at),tg=t.bucket==="daily"?"d":t.bucket==="splurge"?"s":"b",tl=t.bucket==="daily"?"DAILY":t.bucket==="splurge"?"SPLURGE":"BILL",cw=inCW(t.created_at,pd),isDebit=t.card==="debit";
    hi+=`<div class="tr" onclick="openEdit('${t.id}')"><div class="trl"><span style="font-size:17px">${c.i}</span><div><div class="trc">${c.l}<span class="trw"> - ${t.who==="matt"?"Matt":"Liz"}</span><span class="tag tag-${tg}">${tl}</span>${isDebit?`<span class="tag tag-dbt">DEBIT</span>`:""}</div>${t.note?`<div class="trn">${t.note}</div>`:""}<div class="trd">${d.toLocaleDateString("en-AU",{day:"numeric",month:"short",weekday:"short"})}${cw?" · this week":""}${isDebit?"":" · 💳"}</div></div></div><div class="trr"><div class="tra">$${t.amount.toFixed(2)}</div><span style="color:var(--text3);font-size:16px">›</span></div></div>`})}
  document.getElementById("v-hist").innerHTML=hi;
}

function bcard(title,range,spent,cap,dl2,lastWk){
  const pct=Math.min(100,spent/cap*100),rem=Math.max(0,cap-spent),c=bcol(pct);
  let h=`<div class="cd cdp" style="border-left-color:${c}"><div class="ch"><div><div class="lb">${title}</div><div class="dr">${range}</div></div><div class="ca"><span style="color:${c}">$${spent.toFixed(0)}</span><span class="cc"> / $${cap}</span></div></div><div class="tk"><div class="br" style="width:${pct}%;background:${c}"></div></div><div class="rr">`;
  if(pct>=100)h+=`<span class="ov">⚠️ Over by $${(spent-cap).toFixed(0)} - use debit!</span>`;
  else if(pct>=80)h+=`<span class="wn">⚡ $${rem.toFixed(0)} left - slow down</span>`;
  else h+=`<span class="ok">$${rem.toFixed(0)} remaining</span>`;
  if(pct<100)h+=`<span class="pd2">~$${(rem/dl2).toFixed(0)}/day</span>`;
  h+=`</div>`;
  if(lastWk>0)h+=`<div class="fn-row">Last week: $${lastWk.toFixed(0)} ${lastWk>cap?`<span style="color:var(--over)">(over $${(lastWk-cap).toFixed(0)})</span>`:`<span style="color:var(--sage-deep)">($${(cap-lastWk).toFixed(0)} under)</span>`}</div>`;
  h+=`</div>`;return h;
}

window.addEventListener("load",async()=>{loadL();await initSB();if(sessionStorage.getItem("ax")==="1"){document.getElementById("lock").classList.add("hid");document.getElementById("app").classList.remove("hid");render()}});
</script>
